name: epgzonghe

# 每2小时在31分执行一次
on:
  schedule:
    - cron: '31 */2 * * *'
  workflow_dispatch:

jobs:
  generate_and_upload:
    runs-on: ubuntu-latest

    steps:
      # 第一步：检出代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整提交历史

      # 第二步：设置 PHP 7.4 环境
      - name: Set up PHP 7.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer  # 包含composer

      # 第三步：生成EPG文件
      - name: Generate EPG files
        run: |
          # 运行生成脚本
          php epgziyong.php
          
          # 调试：列出生成的文件
          echo "生成的文件列表："
          ls -l *.xml
          
          # 解析files.json并设置环境变量
          echo "正在解析files.json..."
          jq -r 'keys[]' files.json | while read -r filename; do
            echo "设置环境变量: FILENAME_${filename}=${filename}"
            echo "FILENAME_${filename}=${filename}" >> $GITHUB_ENV
          done

      # 第四步：提交变更
      - name: Commit and push changes
        run: |
          # 调试信息
          echo "=== 调试信息 ==="
          echo "当前路径：$(pwd)"
          echo "环境变量中的文件名："
          env | grep 'FILENAME_'
          echo "文件存在检查："
          ls -l *.xml || true

          # 配置Git用户
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          # 收集需要提交的文件
          files_to_add=""
          
          # 从环境变量获取动态文件名
          echo "检查环境变量文件..."
          for var_name in $(env | grep '^FILENAME_' | cut -d'=' -f1); do
            filename="${!var_name}"
            if [ -f "$filename" ]; then
              echo "找到文件: $filename"
              files_to_add="$files_to_add $filename"
            else
              echo "警告：文件不存在 - $filename"
            fi
          done

          # 添加固定文件
          fixed_file="epgziyong.xml"
          if [ -f "$fixed_file" ]; then
            echo "找到固定文件: $fixed_file"
            files_to_add="$files_to_add $fixed_file"
          fi

          # 提交逻辑
          if [ -n "$files_to_add" ]; then
            echo "准备提交以下文件：$files_to_add"
            
            # 显式添加文件
            git add -v $files_to_add
            
            # 检查是否有待提交的变更
            if git status --porcelain | grep -q '^[MADRC]'; then
              now_time=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
              git commit -m "自动更新EPG数据 [$now_time]"
              git pull --rebase origin main  # 防止冲突
              git push origin main
              echo "提交成功！"
            else
              echo "没有检测到文件变更"
            fi
          else
            echo "错误：没有找到需要提交的文件"
            exit 1  # 此处可以根据需要调整退出码
          fi

          # 调试：显示最终状态
          echo "最终Git状态："
          git status --short
