name: epgkai

on:
  schedule:
    - cron: '1 * * * *'  # 每小時的第 1 分鐘執行一次
  workflow_dispatch:  # 允許手動觸發

jobs:
  generate_and_upload:
    runs-on: ubuntu-latest  # 使用 Ubuntu 環境運行

    steps:
      # 1. 檢出代碼
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 設置 PHP 7.4 環境
      - name: Set up PHP 7.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'

      # 3. 生成 epgkai.xml
      - name: Run epgkai.php
        run: |
          php epgkai.php

      # 4. 上傳文件到當前倉庫
      - name: Upload epgkai.xml to tvepg
        uses: actions/upload-artifact@v4
        with:
          name: epgkai.xml
          path: epgkai.xml

      # 5. 檢出目標倉庫 tvepg
      - name: Checkout tvepg repository
        uses: actions/checkout@v4
        with:
          repository: zzq12345/tvepg  # 目標倉庫
          token: ${{ secrets.GITHUB_TOKEN }}
          path: tvepg  # 克隆到本地的路徑

      # 6. 確保 epgkai.xml 存在並比較是否有變更
      - name: Check if epgkai.xml exists and is modified
        run: |
          if [ ! -f epgkai.xml ]; then
            echo "epgkai.xml does not exist."
            exit 1
          fi
          if cmp -s tvepg/epgkai.xml epgkai.xml; then
            echo "No changes detected in epgkai.xml. Skipping commit."
            exit 0
          else
            echo "File is modified, proceeding with update."
          fi

      # 7. 覆蓋並推送更新
      - name: Replace epgkai.xml and push
        run: |
          mv epgkai.xml tvepg/epgkai.xml  # 覆蓋文件
          cd tvepg
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          git add epgkai.xml
          git pull --rebase origin main || echo "No remote changes to pull" 

          now_time=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
          git commit -m "更新時間：$now_time"
          git push origin main || echo "推送到GitHub失敗"
