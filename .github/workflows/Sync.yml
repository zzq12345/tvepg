name: copy files to republic

# 每小时执行一次
on:
  schedule:
    - cron: '37 */1 * * *'  # 每小时执行一次
  workflow_dispatch:  # 允许手动触发

  push:
    branches:
      - main  # 触发工作流的分支
    paths:
      - 'epgtest2.xml'
      - 'epganywhere.xml'

jobs:
  copy-files:
    runs-on: ubuntu-latest

    steps:
      # 步骤 1：克隆私有仓库
      - name: Checkout private repository
        uses: actions/checkout@v3
        with:
          repository: zzq1234567890/epgtest2
          token: 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 # 用于访问私有仓库的 token
          path: private-repo

      # 步骤 2：克隆公开仓库
      - name: Checkout public repository
        uses: actions/checkout@v3
        with:
          repository: zzq1234567890/epg
          token: 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 # 默认的 GitHub token
          path: public-repo

      # 步骤 3：复制文件到公开仓库
      - name: Copy files to public repository
        run: |
          cp private-repo/youtubelive.m3u public-repo/youtubelive.m3u
          cp private-repo/youtubelive.txt public-repo/youtubelive.txt
          cp private-repo/epgziyong.xml public-repo/epgziyong.xml
          
          # 调试：确认文件是否已复制
          echo "Files copied to public repo:"
          ls -l public-repo  # 输出 public-repo 目录中的文件

      # 步骤 4：检查 git 状态，查看是否有更改
      - name: Check git status
        run: |
          cd public-repo
          git status  # 查看文件状态，确认文件是否已被添加到暂存区

      # 步骤 5：提交并推送更改到公开仓库
      - name: Commit and push changes to public repository
        run: |
          cd public-repo
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # 查看文件差异（调试）
          git diff  # 查看文件差异
          
          # 如果有变化，提交并推送更改；如果没有变化，则跳过提交
          git add epgziyong.xml youtubelive.m3u youtubelive.txt
          git commit -m "Automated copy of epg files from private repo" || echo "No changes to commit"
          
          # 推送更改
          git push
